<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightsBlocker</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/global.css">
</head>
<body>
    <dialog id="loading-overlay">
        <div class="loader-content">
            <img src="assets/logo.png" class="loader-logo">
        </div>    
    </dialog>

    <header id="main-header">
        <div class="header-left">
            <img src="assets/logo.png" alt="Logo" class="logo">
            <span class="brand-name"><b>Lights</b>Blocker</span>
        </div>
        <div class="header-right">
            <div class="icon-circle"><img src="https://raw.githubusercontent.com/lightsblocker/community/refs/heads/main/assets/FeedbackIcon.png" alt="Feedback"></div>
            <div class="icon-circle"><img src="https://raw.githubusercontent.com/lightsblocker/community/refs/heads/main/assets/DownloadIcon.png" alt="Download"></div>
            <div class="icon-circle" id="nav-community"><img src="https://raw.githubusercontent.com/lightsblocker/community/refs/heads/main/assets/CommunityIcon.png" alt="Community"></div>
            <div class="icon-circle"><img src="https://raw.githubusercontent.com/lightsblocker/community/refs/heads/main/assets/BlogIcon.png" alt="Blog"></div>
        </div>
    </header>

    <main id="main-container">
        <section id="login-screen" class="view-section">
            <h2>Acesse sua conta</h2>
            <form id="login-form">
                <input type="text" id="login-user" placeholder="E-mail ou Telefone" required>
                <input type="password" id="login-pass" placeholder="Senha" required>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            <div class="login-links">
                <button id="btn-forgot-pass" class="btn-text">Esqueci a senha</button>
                <button id="btn-create-account" class="btn-text">Criar conta</button>
            </div>
        </section>

        <section id="community-screen" class="view-section hidden">
            <div class="community-header">
                <span id="welcome-text" class="welcome-text">Bem-vindo!</span>
                <div class="user-avatar-circle" id="my-profile-btn" style="cursor: pointer;">
                    <img src="" id="user-avatar-img" alt="Avatar">
                </div>
            </div>
            <div id="feed-container"></div>
            <button id="btn-open-new-post" class="fab-button">+</button>
        </section>
    </main>

    <dialog id="dialog-new-post">
        <div class="dialog-content">
            <button class="close-dialog" onclick="this.closest('dialog').close()">X</button>
            <h3>Novo Post</h3>
            <form id="form-new-post">
                <input type="text" id="post-title" placeholder="Título do post" required>
                <select id="post-category" required style="width: 100%; padding: 10px; margin-bottom: 15px; background: #333; color: white; border: none; border-radius: 5px;">
                    <option value="Geral">Carregando categorias...</option>
                </select>
                <textarea id="post-content" placeholder="O que você está pensando?" rows="5" required></textarea>
                <button type="submit" class="btn-primary">Publicar</button>
            </form>
        </div>
    </dialog>

    <dialog id="dialog-post">
        <div class="dialog-content">
            <button class="close-dialog" onclick="this.closest('dialog').close()">X</button>
            <h3 id="dialog-post-title">Título</h3>
            <p id="dialog-post-meta" style="font-size: 0.8rem; font-style: italic; color: #bbb; margin-bottom: 15px;"></p>
            <p id="dialog-post-text" style="font-size: 1.1rem; margin-bottom: 25px; line-height: 1.5;"></p>
            
            <hr style="border: 0.5px solid #444; margin: 20px 0;">
            
            <h4>Comentários</h4>
            <div id="comments-scroll-view" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px; background: #222; padding: 10px; border-radius: 5px;"></div>

            <form id="form-comment" style="display: flex; gap: 5px;">
                <input type="hidden" id="comment-post-code">
                <input type="text" id="comment-text" placeholder="Escreva um comentário..." required style="flex-grow: 1; margin-bottom: 0;">
                <button type="submit" class="btn-primary" style="width: auto; padding: 0 15px;">Enviar</button>
            </form>
        </div>
    </dialog>

    <dialog id="dialog-profile">
        <div class="dialog-content">
            <button class="close-dialog" onclick="this.closest('dialog').close()">X</button>
            <div style="text-align: center;">
                <img src="" id="dialog-profile-avatar" alt="Avatar" style="width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--accent-blue);">
                <br>
                <div id="profile-edit-zone">
                    <button id="btn-edit-profile-avatar" class="btn-text">Trocar Avatar</button>
                </div>
            </div>
            <h3 id="dialog-profile-name" style="text-align: center; margin-top: 10px;">Username</h3>
            <p style="text-align: center;">Membro desde: <span id="profile-since"></span></p>
            <div id="profile-logout-zone" style="text-align: center; margin-top: 20px;">
                <button id="btn-logout" class="btn-text" style="color: #f44336;">Sair da Conta</button>
            </div>
        </div>
    </dialog>

    <dialog id="dialog-register">
        <div class="dialog-content">
            <button class="close-dialog" onclick="this.closest('dialog').close()">X</button>
            <h3>Criar Conta</h3>
            <div style="text-align: center; margin-bottom: 15px;">
                <img id="reg-avatar-preview" src="assets/default-avatar.png" style="width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent-blue);">
                <br>
                <button type="button" id="btn-change-avatar" class="btn-text">Trocar Avatar</button>
                <div id="reg-username-display" style="font-weight: bold; margin-top: 10px;">Gerando...</div>
                <button type="button" id="btn-change-user" class="btn-text">Trocar Nome</button>
            </div>
            <form id="register-form">
                <input type="email" id="reg-email" placeholder="Seu E-mail" required>
                <input type="tel" id="reg-tel" placeholder="Telefone" required>
                <input type="number" id="reg-age" placeholder="Sua Idade" required>
                <input type="password" id="reg-pass" placeholder="Sua Senha" required>
                <button type="submit" class="btn-primary">Finalizar Cadastro</button>
            </form>
        </div>
    </dialog>

    <dialog id="dialog-forgot">
        <div class="dialog-content">
            <button class="close-dialog" onclick="this.closest('dialog').close()">X</button>
            <h3>Recuperar Acesso</h3>
            <form id="forgot-form">
                <input type="email" id="forgot-email" placeholder="E-mail" required>
                <input type="tel" id="forgot-tel" placeholder="Telefone" required>
                <input type="password" id="forgot-new-pass" placeholder="Nova Senha" required>
                <button type="submit" class="btn-primary">Alterar Senha</button>
            </form>
        </div>
    </dialog>

    <script src="assets/js/api.js"></script> 
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/community.js"></script>
</body>
</html>
