<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightsBlocker</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/global.css">
</head>
<body>
    <dialog id="loading-overlay">
        <div class="loader-content">
            <img src="assets/logo.png" class="loader-logo">
        </div>    
    </dialog>

    <header id="main-header">
        <div class="header-left">
            <img src="assets/logo.png" alt="Logo" class="logo">
            <span class="brand-name"><b>Lights</b>Blocker</span>
        </div>
        <div class="header-right">
            <div class="icon-circle"><img src="https://raw.githubusercontent.com/lightsblocker/community/refs/heads/main/assets/FeedbackIcon.png" alt="Feedback"></div>
            <div class="icon-circle"><img src="https://raw.githubusercontent.com/lightsblocker/community/refs/heads/main/assets/DownloadIcon.png" alt="Download"></div>
            <div class="icon-circle"><img src="https://raw.githubusercontent.com/lightsblocker/community/refs/heads/main/assets/CommunityIcon.png" alt="Community"></div>
            <div class="icon-circle"><img src="https://raw.githubusercontent.com/lightsblocker/community/refs/heads/main/assets/BlogIcon.png" alt="Blog"></div>
        </div>
    </header>

    <main id="main-container">
        <section id="login-screen" class="view-section">
            <h2>Acesse sua conta</h2>
            <form id="login-form">
                <input type="text" id="login-user" placeholder="E-mail ou Telefone" required>
                <input type="password" id="login-pass" placeholder="Senha" required>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            <div class="login-links">
                <button id="btn-forgot-pass" class="btn-text">Esqueci a senha</button>
                <button id="btn-create-account" class="btn-text">Criar conta</button>
            </div>
        </section>

        <section id="community-screen" class="view-section hidden">
            <div class="community-header">
                <span id="welcome-text" class="welcome-text">Bem-vindo, Carregando...</span>
                <div class="user-avatar-circle" id="my-profile-btn" style="cursor: pointer;">
                    <img src="" id="user-avatar-img" alt="Avatar">
                </div>
            </div>

            <div id="feed-container"></div>
            <button id="btn-open-new-post" class="fab-button">+</button>
        </section>
    </main>

    <dialog id="dialog-new-post">
        <div class="dialog-content">
            <button class="close-dialog">X</button>
            <h3>Novo Post</h3>
            <form id="form-new-post">
                <input type="text" id="post-title" placeholder="Título do post" required>
                <textarea id="post-content" placeholder="O que você está pensando?" rows="5" required></textarea>
                <button type="submit" class="btn-primary">Publicar</button>
            </form>
        </div>
    </dialog>

    <dialog id="dialog-post">
        <div class="dialog-content">
            <button class="close-dialog">X</button>
            <h3 id="dialog-post-title">Título</h3>
            <p id="dialog-post-meta" class="post-meta-detail"></p>
            <p id="dialog-post-text" class="post-text-detail"></p>
            
            <hr style="border: 0.5px solid #444; margin: 20px 0;">
            
            <h4>Comentários</h4>
            <div id="comments-scroll-view" class="comments-container">
                </div>

            <form id="form-comment" class="comment-input-group">
                <input type="text" id="comment-text" placeholder="Escreva um comentário..." required>
                <button type="submit" class="btn-primary" style="width: auto; padding: 5px 15px;">Enviar</button>
            </form>
        </div>
    </dialog>

    <dialog id="dialog-profile">
        <div class="dialog-content">
            <button class="close-dialog">X</button>
            <div style="text-align: center;">
                <img src="" id="dialog-profile-avatar" alt="Avatar" style="width: 100px; height: 100px; border-radius: 50%;">
                <br>
                <div id="profile-edit-controls">
                    <button id="btn-edit-profile-avatar" class="btn-text">Trocar Avatar</button>
                </div>
            </div>
            <h3 id="dialog-profile-name">Username</h3>
            <p>Aqui desde <span id="profile-since"></span></p>
            <button id="btn-logout" class="btn-text btn-only-owner" style="color: #f44336;">Sair da Conta</button>
        </div>
    </dialog>

    <dialog id="dialog-register">...</dialog>
    <dialog id="dialog-forgot">...</dialog>

    <script src="assets/js/api.js"></script> 
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/community.js"></script>
</body>
</html>
